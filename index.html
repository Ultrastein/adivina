<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Quién es Quién? - Mágico</title>
    <!-- Fuente al estilo Ghibli (Suave y redondeada) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <!-- PANTALLA 1: MENÚ PRINCIPAL -->
    <section id="screen-menu" class="screen active">
        <div class="menu-box">
            <h1>✨ ¿Quién es Quién? ✨</h1>
            <p class="subtitle">Encuentra al personaje misterioso</p>
            
            <div class="menu-actions">
                <button class="btn-primary" onclick="app.showScreen('screen-categories')">🎮 Jugar</button>
                <button class="btn-secondary" onclick="app.showScreen('screen-add-character')">➕ Añadir Personaje</button>
            </div>
        </div>
    </section>

    <!-- PANTALLA 2: CATEGORÍAS -->
    <section id="screen-categories" class="screen">
        <header class="top-bar">
            <button class="btn-back" onclick="app.showScreen('screen-menu')">⬅ Volver</button>
            <h2>Elige una temática</h2>
            <div style="width: 80px;"></div> <!-- espaciador -->
        </header>

        <div class="categories-grid" id="categories-container">
            <!-- Renderizado dinámicamente con JS -->
        </div>
    </section>

    <!-- PANTALLA 3: TABLERO DE JUEGO -->
    <section id="screen-game" class="screen">
        <header class="top-bar">
            <button class="btn-back" onclick="app.showScreen('screen-categories')">⬅ Salir</button>
            <h2 id="game-title">Tablero</h2>
            <button class="btn-info" onclick="app.restartBoard()">🔄 Reiniciar Tablero</button>
        </header>
        
        <div class="board" id="game-board">
            <!-- Las cartas se inyectan dinámicamente -->
        </div>
    </section>

    <!-- PANTALLA 4: AÑADIR PERSONAJE -->
    <section id="screen-add-character" class="screen">
        <header class="top-bar">
            <button class="btn-back" onclick="app.showScreen('screen-menu')">⬅ Volver</button>
            <h2>Nuevo Personaje / Alumno</h2>
            <div style="width: 80px;"></div>
        </header>

        <div class="form-container">
            <div class="form-card">
                <form id="add-char-form" onsubmit="app.addCharacter(event)">
                    <p style="margin-bottom: 20px; color: #666; font-size: 0.95rem;">
                        Agrega a tus alumnos o personajes favoritos con una foto desde tu dispositivo. ¡Se guardará automáticamente!
                    </p>
                    
                    <div class="form-group">
                        <label for="char-category">Categoría:</label>
                        <select id="char-category" required>
                            <option value="Clase">Mi Clase (Alumnos)</option>
                            <option value="Animales">Animales</option>
                            <option value="Tecnología">Tecnología</option>
                            <option value="Historia">Personajes Históricos</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="char-name">Nombre:</label>
                        <input type="text" id="char-name" placeholder="Ej. Totoro, Ana..." required>
                    </div>

                    <div class="form-group">
                        <label for="char-image">Sube una foto:</label>
                        <div class="file-upload-wrapper">
                            <input type="file" id="char-image" accept="image/png, image/jpeg, image/webp" required onchange="app.previewImage(event)">
                            <div class="image-preview" id="image-preview-box">
                                <span>No hay imagen</span>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary" style="width: 100%; margin-top: 15px;">💾 Guardar Personaje</button>
                </form>
            </div>
        </div>
    </section>
</div>

<script src="script.js"></script>
</body>
</html>
